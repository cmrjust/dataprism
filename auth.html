<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimal Login</title>
    <!-- 引入 Supabase 官方 SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h2>DataPrism 极简登录</h2>
    <hr>

    <!-- 纯净登录表单，没有任何复杂的 UI 干扰 -->
    <form id="loginForm">
        <div>
            <label>账号 (Account ID): </label>
            <input type="text" id="accountId" required placeholder="请输入您的账号">
        </div>
        <br>
        <div>
            <label>密码 (Password): </label>
            <input type="password" id="password" required placeholder="请输入您的密码">
        </div>
        <br>
        <button type="submit">登 录</button>
    </form>

    <!-- 错误信息展示区域 -->
    <p id="errorBox" style="color: red; font-weight: bold;"></p>

    <script>
        // 初始化你的 Supabase 配置
        const SUPABASE_URL = 'https://mbxemvfizvmeknfssgut.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Ubs0kjjsXrLDVRauM_j1Ng_Q6OL-cYG';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 监听表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 清空上一次的错误提示
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = "";

            // 获取输入的值
            const rawId = document.getElementById('accountId').value.trim();
            const inputPassword = document.getElementById('password').value.trim();

            // 自动识别：如果是纯数字则转为数字类型，否则保持字符串
            const queryId = isNaN(rawId) ? rawId : Number(rawId);

            try {
                // 第一步：直接去比对 account_id 和 password
                let { data, error } = await _supabase
                    .from('profiles')
                    .select('account_id, balance, password')
                    .eq('account_id', queryId)
                    .eq('password', inputPassword)
                    .maybeSingle();

                if (error) throw error;

                // 第二步：如果在数字/字符串类型上数据库比较严格没匹配到，用原始文本再兜底查一次
                if (!data && typeof queryId === 'number') {
                    const retry = await _supabase
                        .from('profiles')
                        .select('account_id, balance, password')
                        .eq('account_id', rawId)
                        .eq('password', inputPassword)
                        .maybeSingle();
                    if (retry.data) data = retry.data;
                }

                // 第三步：验证最终结果
                if (data) {
                    alert('登录成功！点击确定跳转。');
                    sessionStorage.setItem('current_user_id', data.account_id);
                    sessionStorage.setItem('current_user_balance', data.balance);
                    window.location.href = 'dashboard.html';
                } else {
                    errorBox.textContent = "登录失败：账号或密码不正确。";
                }

            } catch (err) {
                console.error("报错详情:", err);
                errorBox.textContent = "网络或数据库请求错误，请按 F12 并在 Console 查看错误日志。";
            }
        });
    </script>

</body>
</html>
