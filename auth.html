<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPrism - Portal Access</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入你的全局自动化脚本 -->
    <script src="./common.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0F172A',
                            panel: '#1E293B',
                            accent: '#38BDF8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-slate-200 min-h-screen flex flex-col font-sans antialiased selection:bg-brand-accent/30 selection:text-white">

    <!-- Header Navigation -->
    <header class="border-b border-slate-800/80 bg-brand-dark/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <!-- 左上角 Logo 目标区域：严格保留 "D" 字符供 common.js 识别替换 -->
        <div onclick="location.href='index.html'" class="flex items-center space-x-3 cursor-pointer group select-none">
            <div class="w-9 h-9 bg-slate-800 rounded-lg flex items-center justify-center font-bold text-slate-400 border border-slate-700/50 group-hover:border-slate-600 transition-all duration-300">
                D
            </div>
            <span class="font-semibold text-lg tracking-wider text-slate-300 group-hover:text-white transition-colors duration-300">DataPrism</span>
        </div>
        
        <div>
            <a href="terms.html" class="text-xs tracking-wide text-slate-400 hover:text-brand-accent transition-colors duration-200">System Terms</a>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 flex items-center justify-center px-4 py-12 relative overflow-hidden">
        <!-- 背景微弱科技感极光隐喻 -->
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-brand-accent/5 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="w-full max-w-md bg-brand-panel/40 backdrop-blur-xl border border-slate-800/80 rounded-2xl p-8 shadow-2xl relative z-10">
            <!-- 标题区域 -->
            <div class="mb-8 text-center">
                <h1 class="text-2xl font-bold tracking-tight text-white mb-2">Internal Authentication</h1>
                <p class="text-sm text-slate-400">Authorized research personnel node access only</p>
            </div>

            <!-- 动态全局错误 Banner (默认隐藏) -->
            <div id="errorBanner" class="hidden mb-6 p-3 bg-red-950/40 border border-red-800/60 rounded-xl flex items-start space-x-3">
                <svg class="w-5 h-5 text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                <span id="errorMessage" class="text-xs text-red-200/90 leading-relaxed"></span>
            </div>

            <!-- 认证表单 -->
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-5">
                <!-- 核心改动：Account ID 输入框 -->
                <div>
                    <label for="accountId" class="block text-xs font-medium uppercase tracking-wider text-slate-400 mb-2">Account ID</label>
                    <div class="relative">
                        <input type="text" id="accountId" required autocomplete="username" placeholder="e.g., DP-98352-X"
                            class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-accent/70 focus:ring-1 focus:ring-brand-accent/30 transition-all duration-200">
                    </div>
                </div>

                <!-- 密码输入框 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-xs font-medium uppercase tracking-wider text-slate-400">Security Password</label>
                    </div>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••"
                        class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-accent/70 focus:ring-1 focus:ring-brand-accent/30 transition-all duration-200">
                </div>

                <!-- 邀请令牌区域 (保留安全防线) -->
                <div>
                    <label for="invitationToken" class="block text-xs font-medium uppercase tracking-wider text-slate-400 mb-2">Invitation Token</label>
                    <input type="text" id="invitationToken" required placeholder="PRISM-XXXX-XXXX"
                        class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-accent/70 focus:ring-1 focus:ring-brand-accent/30 transition-all duration-200 font-mono tracking-wider">
                </div>

                <!-- 提交按钮 -->
                <button type="submit" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-medium text-sm py-3 px-4 rounded-xl transition-all duration-200 active:scale-[0.99] shadow-lg shadow-white/5">
                    Verify & Establish Session
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-900/60 py-4 px-6 text-center text-[10px] tracking-wider text-slate-600 select-none">
        &copy; 2026 DATAPRISM NETWORK. ALL RIGHTS RESERVED. INTERNAL AUDIT MODE.
    </footer>

    <!-- 交互与临时拦截逻辑 -->
    <script>
        function showError(msg) {
            const banner = document.getElementById('errorBanner');
            const message = document.getElementById('errorMessage');
            message.textContent = msg;
            banner.classList.remove('hidden');
        }

        function handleAuth(e) {
            e.preventDefault();
            
            const accountId = document.getElementById('accountId').value.trim();
            const password = document.getElementById('password').value;
            const token = document.getElementById('invitationToken').value.trim();

            // 当前阶段的静态前台简单截断提示，后续方便直接接入 Supabase .select() 匹配 accountId
            if (accountId === "admin" && password === "admin123") {
                alert("Static test match successful! Next stage: Connect to Supabase RPC.");
            } else {
                showError("Authentication rejected. Node ID not registered in current session tier or invalid invitation token.");
            }
        }
    </script>
</body>
</html>
